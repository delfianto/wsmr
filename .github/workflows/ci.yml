# CI for justfile-rust baseline. Source of truth: delfianto/ci-rust + JUST.md
# Gates: format --check-only · lint · cargo build --all-targets · test

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: extractions/setup-just@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Optional — only for crates that need native libs at build time:
      # - name: System build dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y <packages>

      - name: format
        run: just format --check-only

      - name: lint
        run: just lint

      - name: build
        run: cargo build --all-targets --verbose

      - name: test
        run: just test
