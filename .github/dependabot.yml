version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock at the repo root).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build # -> "build(deps): ..." (Conventional Commits)
    groups:
      # fold routine minor/patch bumps into one PR to cut noise; majors stay solo
      cargo-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI + release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci # -> "ci(deps): ..."
    groups:
      actions-all:
        patterns:
          - "*"
